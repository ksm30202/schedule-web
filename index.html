<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>통합 장비 스케줄 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 22px; }
        .status { text-align: center; color: #27ae60; font-size: 13px; font-weight: bold; margin-bottom: 15px; height: 18px; }
        
        .notice-box { background-color: #fff3cd; color: #856404; padding: 12px; border-radius: 6px; margin-bottom: 15px; text-align: center; border: 1px solid #ffeeba; display: none; word-break: keep-all; font-size: 15px; }
        .notice-name { color: #0056b3; font-weight: bold; font-size: 16px; }
        
        .header-controls { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 15px; }
        .week-nav { display: flex; align-items: center; justify-content: center; width: 100%; gap: 10px; }
        
        /* 💡 추가된 버튼 디자인 (기본적으로 숨김 처리) */
        .week-nav button { display: none; } 
        
        .btn-add { background-color: #27ae60; width: 100%; max-width: 300px; padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; color: white; white-space: nowrap; transition: 0.2s; }
        .btn-add:active { background-color: #219653; }
        .week-title { font-size: 18px; font-weight: bold; min-width: 150px; text-align: center; }
        
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ddd; border-radius: 6px; }
        table.schedule-table { width: 100%; border-collapse: collapse; min-width: 300px; } 
        table.schedule-table th, table.schedule-table td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; box-sizing: border-box; }
        table.schedule-table th { background-color: #f8f9fa; font-weight: bold; font-size: 14px; }
        
        .col-no { position: sticky; left: 0; z-index: 3; background-color: #f8f9fa; width: 45px; min-width: 45px; max-width: 45px; border-right: 1px solid #ddd; color: #555; font-weight: bold; }
        .col-info { position: sticky; left: 45px; z-index: 2; background-color: #f8f9fa; border-right: 2px solid #bbb; box-shadow: 2px 0 5px rgba(0,0,0,0.05); min-width: 120px; }
        tbody .col-no, tbody .col-info { background-color: #fff; }
        
        .sun { color: #e74c3c; } .sat { color: #3498db; }
        .today-col { background-color: #e3f2fd !important; }
        
        .worker-info { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .worker-info input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 16px; width: 100%; box-sizing: border-box; background-color: #fdfdfd; }
        .worker-info input:focus { border: 1px solid #3498db; background-color: #fff; outline: none; }
        
        .cell-container { display: flex; flex-direction: column; gap: 6px; align-items: stretch; min-width: 120px; }
        .attendance-row { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; color: #555; font-weight: bold; }
        .attendance-select { padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background-color: #f8f9fa; cursor: pointer; font-weight: bold; }
        .attendance-select:focus { border-color: #3498db; outline: none; }
        .schedule-input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; background-color: #fdfdfd; width: 100%; }
        .schedule-input:focus { border: 1px solid #3498db; background-color: #fff; outline: none; }
        
        @media (min-width: 768px) { .header-controls { flex-direction: row; } .btn-add { width: auto; } }
    </style>
</head>
<body>

<div class="container">
    <h2>장비 운행 스케줄</h2>
    <div class="status" id="db-status">서버 연결 중...</div>
    
    <div id="unassigned-notice" class="notice-box"></div>
    
    <div class="header-controls">
        <div class="week-nav">
            <button id="prev-btn" onclick="changeWeek(-1)" disabled style="display: none;">◀ 이전</button>
            <span class="week-title" id="week-display"></span>
            <button id="next-btn" onclick="changeWeek(1)" disabled style="display: none;">다음 ▶</button>
        </div>
        <button class="btn-add" onclick="addWorker()">+ 장비/기사 추가</button>
    </div>
    
    <div class="table-wrapper">
        <table class="schedule-table">
            <thead>
                <tr id="table-header"></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://fjlkxesxyitlnkkdapnv.supabase.co';
    
    // 🔴 중요: 여기에 본인의 실제 API 키(anon public)를 다시 입력해 주세요.
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqbGt4ZXN4eWl0bG5ra2RhcG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NjA1MjcsImV4cCI6MjA5NzUzNjUyN30.3JbfUBjFx9UYY-qL8-3-A61nXt3xa2P9kINmnzDTmNo';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false }
    });

    let currentDate = new Date();
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    let workers = [];
    let scheduleData = {};

    function setStatus(msg, color = '#27ae60') {
        const el = document.getElementById('db-status');
        el.innerText = msg;
        el.style.color = color;
        setTimeout(() => { el.innerText = ''; }, 2000);
    }

    async function loadData() {
        setStatus('데이터 불러오는 중...', '#e67e22');
        
        const { data: wData, error: wErr } = await supabaseClient.from('workers').select('*').order('id', { ascending: true });
        if (wData) workers = wData;

        const { data: sData, error: sErr } = await supabaseClient.from('schedules').select('*');
        if (sData) {
            sData.forEach(item => {
                scheduleData[item.data_key] = {
                    content: item.content || '',
                    attendance: item.attendance || ''
                };
            });
        }
        
        renderTable();
        setStatus('서버 연동 완료!');
    }

    function getSunday(date) {
        const d = new Date(date);
        const day = d.getDay();
        return new Date(d.setDate(d.getDate() - day));
    }

    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function renderTable() {
        const sunday = getSunday(currentDate);
        const month = sunday.getMonth() + 1;
        const firstDayOfMonth = new Date(sunday.getFullYear(), sunday.getMonth(), 1);
        const weekNum = Math.ceil((sunday.getDate() + firstDayOfMonth.getDay()) / 7);
        
        document.getElementById('week-display').innerText = `${month}월 ${weekNum}주차`;

        const theadRow = document.getElementById('table-header');
        theadRow.innerHTML = '<th class="col-no">No.</th><th class="col-info">장비 / 기사</th>';
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        let weekDates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(sunday);
            d.setDate(sunday.getDate() + i);
            d.setHours(0, 0, 0, 0); 
            
            if (d < today) continue;

            weekDates.push(d);
            
            const th = document.createElement('th');
            th.innerHTML = `${d.getMonth() + 1}/${d.getDate()}<br>(${dayNames[d.getDay()]})`;
            if (d.getDay() === 0) th.classList.add('sun');
            if (d.getDay() === 6) th.classList.add('sat');
            
            if (d.getTime() === today.getTime()) {
                th.classList.add('today-col');
            }
            
            theadRow.appendChild(th);
        }

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        let unassignedWorkers = new Set();

        workers.forEach((worker, index) => {
            const tr = document.createElement('tr');
            
            const noTd = document.createElement('td');
            noTd.className = 'col-no';
            noTd.innerText = index + 1;
            tr.appendChild(noTd);

            const infoTd = document.createElement('td');
            infoTd.className = 'col-info';
            infoTd.innerHTML = `
                <div class="worker-info">
                    <input type="text" placeholder="장비 (02)" value="${worker.machine || ''}" onchange="updateWorker(${worker.id}, 'machine', this.value)">
                    <input type="text" placeholder="기사명" value="${worker.name || ''}" onchange="updateWorker(${worker.id}, 'name', this.value)">
                </div>
            `;
            tr.appendChild(infoTd);

            weekDates.forEach(date => {
                const td = document.createElement('td');
                if (date.getTime() === today.getTime()) {
                    td.classList.add('today-col');
                }
                
                const dateStr = formatDate(date);
                const dataKey = `${worker.id}_${dateStr}`;
                
                const cellData = scheduleData[dataKey] || { content: '', attendance: '' };
                
                if (cellData.attendance !== 'O' && cellData.attendance !== 'X') {
                    const displayName = (worker.name || worker.machine || '').trim();
                    if(displayName) unassignedWorkers.add(displayName);
                }

                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell-container';

                const attRow = document.createElement('div');
                attRow.className = 'attendance-row';
                
                const attLabel = document.createElement('span');
                attLabel.innerText = '배차여부:';

                const select = document.createElement('select');
                select.className = 'attendance-select';
                const options = [
                    { value: '', text: '-' },
                    { value: 'O', text: 'O' },
                    { value: 'X', text: 'X' }
                ];
                options.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt.value;
                    option.text = opt.text;
                    if (cellData.attendance === opt.value) option.selected = true;
                    if (opt.value === 'O') option.style.color = 'blue';
                    if (opt.value === 'X') option.style.color = 'red';
                    select.appendChild(option);
                });

                attRow.appendChild(attLabel);
                attRow.appendChild(select);

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'schedule-input';
                input.placeholder = "일정 입력";
                input.value = cellData.content;
                
                const saveCellData = async () => {
                    const contentVal = input.value.trim();
                    const attendanceVal = select.value;
                    
                    scheduleData[dataKey] = { content: contentVal, attendance: attendanceVal };
                    setStatus('저장 중...', '#e67e22');
                    
                    if(contentVal === '' && attendanceVal === '') {
                        await supabaseClient.from('schedules').delete().eq('data_key', dataKey);
                    } else {
                        await supabaseClient.from('schedules').upsert({ 
                            data_key: dataKey, 
                            content: contentVal,
                            attendance: attendanceVal
                        });
                    }
                    setStatus('저장 완료!');
                    
                    renderTable();
                };

                select.onchange = saveCellData;
                input.onchange = saveCellData;

                cellDiv.appendChild(attRow);
                cellDiv.appendChild(input);
                
                td.appendChild(cellDiv);
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });

        const noticeBox = document.getElementById('unassigned-notice');
        if (weekDates.length > 0 && unassignedWorkers.size > 0) {
            noticeBox.style.display = 'block';
            noticeBox.innerHTML = `📢 <b>이번 주 배차 미정:</b> <span class="notice-name">${Array.from(unassignedWorkers).join(', ')}</span>`;
        } else {
            noticeBox.style.display = 'none';
        }
    }

    function changeWeek(delta) {
        currentDate.setDate(currentDate.getDate() + (delta * 7));
        renderTable();
    }

    async function addWorker() {
        const newId = Date.now();
        const newWorker = { id: newId, machine: '', name: '' };
        workers.push(newWorker);
        renderTable(); 
        await supabaseClient.from('workers').insert([newWorker]);
    }

    async function updateWorker(id, field, value) {
        const worker = workers.find(w => w.id === id);
        if (worker) {
            worker[field] = value;
            setStatus('정보 업데이트 중...', '#e67e22');
            await supabaseClient.from('workers').update({ [field]: value }).eq('id', id);
            setStatus('저장 완료!');
            
            renderTable();
        }
    }

    loadData();

</script>

</body>
</html>

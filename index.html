<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장비 주간 스케줄 관리 (로컬 저장형)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .week-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .week-nav button, .btn {
            padding: 8px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .week-nav button {
            background: #3498db;
            color: white;
        }
        .week-nav button:hover { background: #2980b9; }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-add { background-color: #27ae60; color: white; }
        .btn-add:hover { background-color: #219653; }
        .btn-save { background-color: #f1c40f; color: #333; }
        .btn-save:hover { background-color: #d4ac0d; }
        .btn-export { background-color: #8e44ad; color: white; }
        .btn-export:hover { background-color: #732d91; }
        .btn-import { background-color: #e67e22; color: white; }
        .btn-import:hover { background-color: #d35400; }

        .week-title {
            font-size: 20px;
            font-weight: bold;
            min-width: 180px;
            text-align: center;
        }
        .table-responsive {
            overflow-x: auto;
        }
        table.schedule-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1100px;
        }
        table.schedule-table th, table.schedule-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            vertical-align: middle;
        }
        table.schedule-table th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        .sun { color: #e74c3c; }
        .sat { color: #3498db; }
        
        .worker-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 160px;
        }
        .worker-info input {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 3px;
            text-align: center;
            font-size: 13px;
        }
        .schedule-input {
            width: 90%;
            padding: 8px;
            border: 1px solid transparent;
            border-radius: 3px;
            background-color: #fdfdfd;
            font-size: 14px;
        }
        .schedule-input:focus, .schedule-input:hover {
            border: 1px solid #3498db;
            background-color: #fff;
            outline: none;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 3px 5px;
            cursor: pointer;
            font-size: 11px;
        }
        .delete-btn:hover { background: #c0392b; }
        
        #file-input { display: none; }
        .save-indicator {
            text-align: right;
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>통합 장비 운행 스케줄 (자동 저장형)</h2>
    
    <div class="header-controls">
        <div class="week-nav">
            <button onclick="changeWeek(-1)">◀ 이전 주</button>
            <span class="week-title" id="week-display">2026년 6월 3주차</span>
            <button onclick="changeWeek(1)">다음 주 ▶</button>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-add" onclick="addWorker()">+ 장비/기사 추가</button>
            <button class="btn btn-export" onclick="exportData()">💾 파일로 내보내기</button>
            <button class="btn btn-import" onclick="document.getElementById('file-input').click()">📂 파일 불러오기</button>
            <input type="file" id="file-input" accept=".json" onchange="importData(event)">
        </div>
    </div>
    
    <div class="table-responsive">
        <table class="schedule-table">
            <thead>
                <tr id="table-header"></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    <div class="save-indicator">※ 모든 변경사항은 브라우저에 실시간으로 자동 저장됩니다.</div>
</div>

<script>
    let currentDate = new Date();
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    
    // 데이터 구조 기본값 설정 (로컬 스토리지에서 먼저 읽어옴)
    let workers = JSON.parse(localStorage.getItem('equipment_workers')) || [
        { id: 1, machine: '포크레인 02', name: '홍길동' },
        { id: 2, machine: '포크레인 06', name: '이순신' }
    ];
    let scheduleData = JSON.parse(localStorage.getItem('equipment_schedules')) || {};

    // 데이터 로컬스토리지 저장 함수
    function saveToLocalStorage() {
        localStorage.setItem('equipment_workers', JSON.stringify(workers));
        localStorage.setItem('equipment_schedules', JSON.stringify(scheduleData));
    }

    function getSunday(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day;
        return new Date(d.setDate(diff));
    }

    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function renderTable() {
        const sunday = getSunday(currentDate);
        const month = sunday.getMonth() + 1;
        
        // 주차 계산
        const firstDayOfMonth = new Date(sunday.getFullYear(), sunday.getMonth(), 1);
        const addedDays = sunday.getDate() + firstDayOfMonth.getDay();
        const weekNum = Math.ceil(addedDays / 7);
        
        document.getElementById('week-display').innerText = `${sunday.getFullYear()}년 ${month}월 ${weekNum}주차`;

        // 헤더 생성
        const theadRow = document.getElementById('table-header');
        theadRow.innerHTML = '<th>장비 및 기사 정보</th>';
        
        let weekDates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(sunday);
            d.setDate(sunday.getDate() + i);
            weekDates.push(d);
            
            const th = document.createElement('th');
            th.innerText = `${d.getMonth() + 1}/${d.getDate()} (${dayNames[i]})`;
            if (i === 0) th.classList.add('sun');
            if (i === 6) th.classList.add('sat');
            theadRow.appendChild(th);
        }

        // 바디 생성
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        workers.forEach(worker => {
            const tr = document.createElement('tr');
            
            // 장비/인원 정보 정보창
            const infoTd = document.createElement('td');
            infoTd.innerHTML = `
                <div class="worker-info">
                    <input type="text" placeholder="장비 기종" value="${worker.machine}" onchange="updateWorker(${worker.id}, 'machine', this.value)">
                    <input type="text" placeholder="기사명" value="${worker.name}" onchange="updateWorker(${worker.id}, 'name', this.value)">
                    <div><button class="delete-btn" onclick="removeWorker(${worker.id})">행 삭제</button></div>
                </div>
            `;
            tr.appendChild(infoTd);

            // 7일간의 일정 입력란
            weekDates.forEach(date => {
                const td = document.createElement('td');
                const dateStr = formatDate(date);
                const dataKey = `${worker.id}_${dateStr}`;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'schedule-input';
                input.placeholder = "-";
                input.value = scheduleData[dataKey] || '';
                
                input.onchange = function() {
                    scheduleData[dataKey] = this.value;
                    saveToLocalStorage(); // 변경 시 자동 저장
                };

                td.appendChild(input);
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });
    }

    function changeWeek(delta) {
        currentDate.setDate(currentDate.getDate() + (delta * 7));
        renderTable();
    }

    function addWorker() {
        workers.push({ id: Date.now(), machine: '', name: '' });
        saveToLocalStorage();
        renderTable();
    }

    function removeWorker(id) {
        if(confirm('해당 장비와 이번 주를 포함한 모든 일정을 삭제하시겠습니까?')) {
            workers = workers.filter(w => w.id !== id);
            // 해당 worker 관련 스케줄 데이터 지우기 (선택사항)
            Object.keys(scheduleData).forEach(key => {
                if(key.startsWith(id + '_')) delete scheduleData[key];
            });
            saveToLocalStorage();
            renderTable();
        }
    }

    function updateWorker(id, field, value) {
        const worker = workers.find(w => w.id === id);
        if (worker) {
            worker[field] = value;
            saveToLocalStorage();
        }
    }

    // [파일 기능 1] 데이터 내보내기 (텍스트 파일 다운로드)
    function exportData() {
        const totalData = {
            workers: workers,
            schedules: scheduleData
        };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(totalData));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `장비스케줄_${formatDate(new Date())}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    // [파일 기능 2] 데이터 불러오기 (파일 업로드 받아 적용)
    function importData(event) {
        const input = event.target;
        const reader = new FileReader();
        reader.onload = function(){
            try {
                const imported = JSON.parse(reader.result);
                if(imported.workers && imported.schedules) {
                    workers = imported.workers;
                    scheduleData = imported.schedules;
                    saveToLocalStorage();
                    renderTable();
                    alert('성공적으로 스케줄 데이터를 불러왔습니다.');
                } else {
                    alert('올바른 스케줄 파일 형식이 아닙니다.');
                }
            } catch (e) {
                alert('파일을 읽는 중 오류가 발생했습니다.');
            }
        };
        if(input.files[0]) {
            reader.readAsText(input.files[0]);
        }
    }

    // 최초 실행
    renderTable();
</script>

</body>
</html>

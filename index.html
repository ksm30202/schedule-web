<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>통합 장비 스케줄 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 22px; }
        .status { text-align: center; color: #27ae60; font-size: 13px; font-weight: bold; margin-bottom: 15px; height: 18px; }
        .header-controls { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 15px; }
        .week-nav { display: flex; align-items: center; justify-content: center; width: 100%; gap: 10px; }
        .week-nav button, .btn-add { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; color: white; white-space: nowrap; }
        .week-nav button { background: #3498db; }
        .week-nav button:active { background: #2980b9; }
        .btn-add { background-color: #27ae60; width: 100%; max-width: 300px; }
        .btn-add:active { background-color: #219653; }
        .week-title { font-size: 18px; font-weight: bold; min-width: 150px; text-align: center; }
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ddd; border-radius: 6px; }
        table.schedule-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        table.schedule-table th, table.schedule-table td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; }
        table.schedule-table th { background-color: #f8f9fa; font-weight: bold; font-size: 14px; }
        table.schedule-table th:first-child, table.schedule-table td:first-child { position: sticky; left: 0; z-index: 2; background-color: #f8f9fa; border-right: 2px solid #bbb; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        table.schedule-table td:first-child { background-color: #fff; }
        .sun { color: #e74c3c; } .sat { color: #3498db; }
        .worker-info { display: flex; flex-direction: column; gap: 6px; width: 120px; }
        .worker-info input, .schedule-input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 16px; width: 100%; box-sizing: border-box; background-color: #fdfdfd; }
        .schedule-input { min-width: 100px; }
        .worker-info input:focus, .schedule-input:focus { border: 1px solid #3498db; background-color: #fff; outline: none; }
        .delete-btn { background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 6px 5px; cursor: pointer; font-size: 13px; font-weight: bold; }
        @media (min-width: 768px) { .header-controls { flex-direction: row; } .btn-add { width: auto; } .worker-info { width: 150px; } }
    </style>
</head>
<body>

<div class="container">
    <h2>장비 운행 스케줄</h2>
    <div class="status" id="db-status">서버 연결 중...</div>
    
    <div class="header-controls">
        <div class="week-nav">
            <button onclick="changeWeek(-1)">◀ 이전</button>
            <span class="week-title" id="week-display"></span>
            <button onclick="changeWeek(1)">다음 ▶</button>
        </div>
        <button class="btn-add" onclick="addWorker()">+ 장비/기사 추가</button>
    </div>
    
    <div class="table-wrapper">
        <table class="schedule-table">
            <thead>
                <tr id="table-header"></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // 1. API 주소 및 키 설정
    const SUPABASE_URL = 'https://fjlkxesxyitlnkkdapnv.supabase.co';
    
    // 🔴 중요: 아래 '여기에_본인의_API_키를_붙여넣으세요' 글자를 지우고, 
    // 본인의 실제 슈퍼베이스 anon key를 반드시 따옴표 안에 넣어주세요.
    const SUPABASE_ANON_KEY = 'sb_publishable_IcJotHIL9pOvqjX_BpP0DQ_CxhStMeB';

    // 2. 단 한 번만 선언되는 클라이언트 및 브라우저 세션 차단 옵션 적용
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false }
    });

    let currentDate = new Date();
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    let workers = [];
    let scheduleData = {};

    function setStatus(msg, color = '#27ae60') {
        const el = document.getElementById('db-status');
        el.innerText = msg;
        el.style.color = color;
        setTimeout(() => { el.innerText = ''; }, 2000);
    }

    async function loadData() {
        setStatus('데이터 불러오는 중...', '#e67e22');
        
        const { data: wData, error: wErr } = await supabase.from('workers').select('*').order('id', { ascending: true });
        if (wData) workers = wData;

        const { data: sData, error: sErr } = await supabase.from('schedules').select('*');
        if (sData) {
            sData.forEach(item => {
                scheduleData[item.data_key] = item.content;
            });
        }
        
        renderTable();
        setStatus('서버 연동 완료!');
    }

    function getSunday(date) {
        const d = new Date(date);
        const day = d.getDay();
        return new Date(d.setDate(d.getDate() - day));
    }

    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function renderTable() {
        const sunday = getSunday(currentDate);
        const month = sunday.getMonth() + 1;
        const firstDayOfMonth = new Date(sunday.getFullYear(), sunday.getMonth(), 1);
        const weekNum = Math.ceil((sunday.getDate() + firstDayOfMonth.getDay()) / 7);
        
        document.getElementById('week-display').innerText = `${month}월 ${weekNum}주차`;

        const theadRow = document.getElementById('table-header');
        theadRow.innerHTML = '<th>장비 / 기사</th>';
        
        let weekDates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(sunday);
            d.setDate(sunday.getDate() + i);
            weekDates.push(d);
            
            const th = document.createElement('th');
            th.innerHTML = `${d.getMonth() + 1}/${d.getDate()}<br>(${dayNames[i]})`;
            if (i === 0) th.classList.add('sun');
            if (i === 6) th.classList.add('sat');
            theadRow.appendChild(th);
        }

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        workers.forEach(worker => {
            const tr = document.createElement('tr');
            
            const infoTd = document.createElement('td');
            infoTd.innerHTML = `
                <div class="worker-info">
                    <input type="text" placeholder="장비 (02)" value="${worker.machine || ''}" onchange="updateWorker(${worker.id}, 'machine', this.value)">
                    <input type="text" placeholder="기사명" value="${worker.name || ''}" onchange="updateWorker(${worker.id}, 'name', this.value)">
                    <button class="delete-btn" onclick="removeWorker(${worker.id})">삭제</button>
                </div>
            `;
            tr.appendChild(infoTd);

            weekDates.forEach(date => {
                const td = document.createElement('td');
                const dateStr = formatDate(date);
                const dataKey = `${worker.id}_${dateStr}`;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'schedule-input';
                input.placeholder = "-";
                input.value = scheduleData[dataKey] || '';
                
                input.onchange = async function() {
                    const val = this.value.trim();
                    scheduleData[dataKey] = val;
                    setStatus('저장 중...', '#e67e22');
                    
                    if(val === '') {
                        await supabase.from('schedules').delete().eq('data_key', dataKey);
                    } else {
                        await supabase.from('schedules').upsert({ data_key: dataKey, content: val });
                    }
                    setStatus('저장 완료!');
                };

                td.appendChild(input);
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });
    }

    function changeWeek(delta) {
        currentDate.setDate(currentDate.getDate() + (delta * 7));
        renderTable();
    }

    async function addWorker() {
        const newId = Date.now();
        const newWorker = { id: newId, machine: '', name: '' };
        workers.push(newWorker);
        renderTable(); 
        await supabase.from('workers').insert([newWorker]);
    }

    async function updateWorker(id, field, value) {
        const worker = workers.find(w => w.id === id);
        if (worker) {
            worker[field] = value;
            setStatus('정보 업데이트 중...', '#e67e22');
            await supabase.from('workers').update({ [field]: value }).eq('id', id);
            setStatus('저장 완료!');
        }
    }

    async function removeWorker(id) {
        if(confirm('이 장비를 삭제하시겠습니까?')) {
            workers = workers.filter(w => w.id !== id);
            renderTable(); 
            await supabase.from('workers').delete().eq('id', id);
        }
    }

    loadData();

</script>

</body>
</html>

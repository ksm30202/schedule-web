<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 장비 스케줄 관리 (Supabase 연동)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .status { text-align: center; color: #27ae60; font-size: 14px; font-weight: bold; margin-bottom: 20px; height: 20px; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .week-nav { display: flex; align-items: center; gap: 15px; }
        .week-nav button, .btn-add { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; color: white; }
        .week-nav button { background: #3498db; }
        .week-nav button:hover { background: #2980b9; }
        .btn-add { background-color: #27ae60; }
        .btn-add:hover { background-color: #219653; }
        .week-title { font-size: 20px; font-weight: bold; min-width: 180px; text-align: center; }
        table.schedule-table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        table.schedule-table th, table.schedule-table td { border: 1px solid #ddd; padding: 10px; text-align: center; vertical-align: middle; }
        table.schedule-table th { background-color: #f8f9fa; font-weight: bold; }
        .sun { color: #e74c3c; } .sat { color: #3498db; }
        .worker-info { display: flex; flex-direction: column; gap: 5px; width: 160px; }
        .worker-info input { padding: 6px; border: 1px solid #ccc; border-radius: 3px; text-align: center; font-size: 13px; }
        .schedule-input { width: 90%; padding: 8px; border: 1px solid transparent; border-radius: 3px; background-color: #fdfdfd; font-size: 14px; }
        .schedule-input:focus, .schedule-input:hover { border: 1px solid #3498db; background-color: #fff; outline: none; }
        .delete-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; padding: 3px 5px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2>통합 장비 운행 스케줄</h2>
    <div class="status" id="db-status">서버 연결 중...</div>
    
    <div class="header-controls">
        <div class="week-nav">
            <button onclick="changeWeek(-1)">◀ 이전 주</button>
            <span class="week-title" id="week-display"></span>
            <button onclick="changeWeek(1)">다음 주 ▶</button>
        </div>
        <button class="btn-add" onclick="addWorker()">+ 장비/기사 추가</button>
    </div>
    
    <div style="overflow-x: auto;">
        <table class="schedule-table">
            <thead>
                <tr id="table-header"></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // 🔴 중요: 본인의 슈퍼베이스 URL과 anon 키를 입력하세요.
    const SUPABASE_URL = 'https://fjlkxesxyitlnkkdapnv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqbGt4ZXN4eWl0bG5ra2RhcG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NjA1MjcsImV4cCI6MjA5NzUzNjUyN30.3JbfUBjFx9UYY-qL8-3-A61nXt3xa2P9kINmnzDTmNo';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentDate = new Date();
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    
    let workers = [];
    let scheduleData = {};

    function setStatus(msg, color = '#27ae60') {
        const el = document.getElementById('db-status');
        el.innerText = msg;
        el.style.color = color;
        setTimeout(() => { el.innerText = ''; }, 2000);
    }

    // 1. DB에서 데이터 불러오기 (최초 1회)
    async function loadData() {
        setStatus('데이터 불러오는 중...', '#e67e22');
        
        // 장비 목록 가져오기
        const { data: wData, error: wErr } = await supabase.from('workers').select('*').order('id', { ascending: true });
        if (wData) workers = wData;

        // 스케줄 데이터 가져오기
        const { data: sData, error: sErr } = await supabase.from('schedules').select('*');
        if (sData) {
            sData.forEach(item => {
                scheduleData[item.data_key] = item.content;
            });
        }
        
        renderTable();
        setStatus('서버와 동기화 완료!');
    }

    function getSunday(date) {
        const d = new Date(date);
        const day = d.getDay();
        return new Date(d.setDate(d.getDate() - day));
    }

    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // 화면 그리기
    function renderTable() {
        const sunday = getSunday(currentDate);
        const month = sunday.getMonth() + 1;
        const firstDayOfMonth = new Date(sunday.getFullYear(), sunday.getMonth(), 1);
        const weekNum = Math.ceil((sunday.getDate() + firstDayOfMonth.getDay()) / 7);
        
        document.getElementById('week-display').innerText = `${sunday.getFullYear()}년 ${month}월 ${weekNum}주차`;

        const theadRow = document.getElementById('table-header');
        theadRow.innerHTML = '<th>장비 및 기사 정보</th>';
        
        let weekDates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(sunday);
            d.setDate(sunday.getDate() + i);
            weekDates.push(d);
            
            const th = document.createElement('th');
            th.innerText = `${d.getMonth() + 1}/${d.getDate()} (${dayNames[i]})`;
            if (i === 0) th.classList.add('sun');
            if (i === 6) th.classList.add('sat');
            theadRow.appendChild(th);
        }

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        workers.forEach(worker => {
            const tr = document.createElement('tr');
            
            const infoTd = document.createElement('td');
            infoTd.innerHTML = `
                <div class="worker-info">
                    <input type="text" placeholder="장비 기종" value="${worker.machine || ''}" onchange="updateWorker(${worker.id}, 'machine', this.value)">
                    <input type="text" placeholder="기사명" value="${worker.name || ''}" onchange="updateWorker(${worker.id}, 'name', this.value)">
                    <div><button class="delete-btn" onclick="removeWorker(${worker.id})">삭제</button></div>
                </div>
            `;
            tr.appendChild(infoTd);

            weekDates.forEach(date => {
                const td = document.createElement('td');
                const dateStr = formatDate(date);
                const dataKey = `${worker.id}_${dateStr}`;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'schedule-input';
                input.placeholder = "-";
                input.value = scheduleData[dataKey] || '';
                
                // 스케줄 입력 변경 시 즉시 DB 업데이트 (Upsert)
                input.onchange = async function() {
                    const val = this.value.trim();
                    scheduleData[dataKey] = val;
                    setStatus('저장 중...', '#e67e22');
                    
                    if(val === '') {
                        await supabase.from('schedules').delete().eq('data_key', dataKey);
                    } else {
                        await supabase.from('schedules').upsert({ data_key: dataKey, content: val });
                    }
                    setStatus('저장 완료!');
                };

                td.appendChild(input);
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });
    }

    function changeWeek(delta) {
        currentDate.setDate(currentDate.getDate() + (delta * 7));
        renderTable();
    }

    // 장비 추가 (DB Insert)
    async function addWorker() {
        const newId = Date.now();
        const newWorker = { id: newId, machine: '', name: '' };
        workers.push(newWorker);
        renderTable(); // 화면 먼저 반영
        
        await supabase.from('workers').insert([newWorker]);
    }

    // 장비 수정 (DB Update)
    async function updateWorker(id, field, value) {
        const worker = workers.find(w => w.id === id);
        if (worker) {
            worker[field] = value;
            setStatus('정보 업데이트 중...', '#e67e22');
            await supabase.from('workers').update({ [field]: value }).eq('id', id);
            setStatus('저장 완료!');
        }
    }

    // 장비 삭제 (DB Delete)
    async function removeWorker(id) {
        if(confirm('이 장비를 삭제하시겠습니까? (기존 일정은 데이터베이스에 보관됩니다)')) {
            workers = workers.filter(w => w.id !== id);
            renderTable(); // 화면 먼저 반영
            await supabase.from('workers').delete().eq('id', id);
        }
    }

    // 초기 데이터 로드 실행
    loadData();

</script>

</body>
</html>
